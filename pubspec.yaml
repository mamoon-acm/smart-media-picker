name: smart_media_picker
description: A highly customizable, all-in-one Flutter widget for picking, compressing, and displaying images and videos with built-in state management.
version: 1.0.1
homepage: https://github.com/mamoon-acm/smart-media-picker
issue_tracker: https://github.com/mamoon-acm/smart-media-picker/-/issues
topics:
  - image-picker
  - video
  - form-field
  - media
  - ui-components
environment:
  sdk: ^3.10.7  
  flutter: ">=1.17.0"

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  video_player: ^2.11.1
  video_thumbnail: ^0.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

